<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assest/css/lymeng.css">
    <link rel="stylesheet" href="assest/vendor/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Login </title>
</head>
<body>
    <section class="section-login  auth ">
      <div class="section-login-overlay py-5">
         <div class="container">
            <div class="row justify-content-center align-items-center">
               <div class="col-12 col-lg-6 col-xl-4">
                  <div class="card shadow">
                     <div class="card-body  "  id="step-otp">
                        <div class="icon-circle text-info text-center display-3">
                           <i class="bi bi-envelope-at"></i>
                        </div>

                        <h4 class="text-center fw-semibold mb-1">Enter OTP code</h4>
                        <p class="text-center text-muted small mb-1">We sent a 6-digit code to</p>
                        <p class="text-center fw-semibold mb-4" id="display-email">user@example.com</p>

                        <form class=" needs-validation" action="#" novalidate>
                           <div class="d-flex justify-content-center gap-2 mb-2" id="otp-boxes"></div>
                           <div id="error-msg" class="text-danger text-center small mb-2" style="display:none; min-height:18px;"></div>


                           <button class="btn btn-verify btn-primary w-100 text-white mt-2" id="verify-btn"onclick="verifyOtp()">  Verify </button>
                           
                           <div class="text-center text-muted small mt-3 mb-0">
                              <span id="timer-text">Resend code in <strong id="countdown">30s</strong></span>
                              <a class="resend-link" id="resend-link" style="display:none;" onclick="resend()">Resend
                                 code</a>
                           </div>
                        </form>
                        </div>
                        <div id="step-success" style="display:none; text-align:center;">
                           <div class="success-circle">
                              <i class="bi bi-check-lg"></i>
                           </div>
                           <h4 class="fw-semibold mb-1">Verified!</h4>
                           <p class="text-muted small mb-4">Your identity has been confirmed.<br>You can now reset your
                              password.</p>
                           <button type="button" class="btn btn-verify btn-primary w-100 text-white" onclick="resetDemo()"> <a
                                 href="ChangePassword.html"
                                 class=" text-light text-decoration-none">Continue</a></button>
                        </div>

                     

                  </div>
               </div>
            </div>
         </div>
      </div>
   </section>


   <Script src="asset/vender/bootstrap-5.3.8-dist/js/bootstrap.bundle.js"></Script>
   <script>
      let timerInterval;

      function buildBoxes() {
         const container = document.getElementById('otp-boxes');
         container.innerHTML = '';
         for (let i = 0; i < 6; i++) {
            const inp = document.createElement('input');
            inp.type = 'text';
            inp.maxLength = 1;
            inp.inputMode = 'numeric';
            inp.className = 'otp-input form-control';
            inp.addEventListener('input', e => {
               inp.value = inp.value.replace(/\D/g, '');
               clearError();
               if (inp.value && inp.nextSibling) inp.nextSibling.focus();
            });
            inp.addEventListener('keydown', e => {
               if (e.key === 'Backspace' && !inp.value && inp.previousSibling)
                  inp.previousSibling.focus();
            });
            inp.addEventListener('paste', e => {
               e.preventDefault();
               const paste = (e.clipboardData || window.clipboardData)
                  .getData('text').replace(/\D/g, '').slice(0, 6);
               const boxes = document.querySelectorAll('#otp-boxes input');
               paste.split('').forEach((ch, idx) => { if (boxes[idx]) boxes[idx].value = ch; });
               const next = boxes[Math.min(paste.length, 5)];
               if (next) next.focus();
            });
            container.appendChild(inp);
         }
         container.firstChild.focus();
      }

      function getCode() {
         return [...document.querySelectorAll('#otp-boxes input')].map(b => b.value).join('');
      }

      function showError(msg) {
         const el = document.getElementById('error-msg');
         el.textContent = msg;
         el.style.display = 'block';
         document.querySelectorAll('#otp-boxes input').forEach(b => b.classList.add('is-invalid'));
      }

      function clearError() {
         document.getElementById('error-msg').style.display = 'none';
         document.querySelectorAll('#otp-boxes input').forEach(b => b.classList.remove('is-invalid'));
      }

      function verifyOtp() {
         const code = getCode();
         if (code.length < 6) { showError('Please enter all 6 digits.'); return; }

         const btn = document.getElementById('verify-btn');
         btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Verifying…';
         btn.disabled = true;

         setTimeout(() => {
            btn.innerHTML = 'Verify';
            btn.disabled = false;

            if (code === '123456') {
               document.getElementById('step-otp').style.display = 'none';
               document.getElementById('step-success').style.display = 'block';
               clearInterval(timerInterval);
            } else {
               showError('Incorrect code. Please try again.');
               document.querySelectorAll('#otp-boxes input').forEach(b => b.value = '');
               document.querySelector('#otp-boxes input').focus();
            }
         }, 1000);
      }

      function startTimer() {
         clearInterval(timerInterval);
         let secs = 30;
         document.getElementById('timer-text').style.display = 'inline';
         document.getElementById('resend-link').style.display = 'none';
         document.getElementById('countdown').textContent = secs + 's';

         timerInterval = setInterval(() => {
            secs--;
            if (secs <= 0) {
               clearInterval(timerInterval);
               document.getElementById('timer-text').style.display = 'none';
               document.getElementById('resend-link').style.display = 'inline';
            } else {
               document.getElementById('countdown').textContent = secs + 's';
            }
         }, 1000);
      }

      function resend() {
         document.querySelectorAll('#otp-boxes input').forEach(b => b.value = '');
         document.querySelector('#otp-boxes input').focus();
         clearError();
         startTimer();
      }

      function resetDemo() { location.reload(); }

      buildBoxes();
      startTimer();
   </script>


</body>
</html>
    <script src="assest/vendor/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
