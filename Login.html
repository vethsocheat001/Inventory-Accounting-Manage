<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assest/css/lymeng.css">
  <link rel="stylesheet" href="assest/vendor/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <title>Login </title>
  <style>
    

    .card {
    
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      color: white;
      width: 1000px;
    }

    .form-control {
      background: rgba(255, 255, 255, 0.1) !important;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white !important;
      border-radius: 10px;
      padding: 12px 15px;
    }

     .form-control::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    .btn-login {
      margin-top: 2.2rem;
      background: white;
      color: #39145f;
      border-radius: 50px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <section class="section-login  auth bg-secondary ">
    <div class="section-login-overlay py-5 ">
      <div class="container ">
        <div class="row justify-content-center align-items-center rounded-4">
          <div class="col-12 col-lg-6 col-xl-4">
            <div class="card shadow-lg bg-secondary p-5 border-2 border-dark ">
              <h1 class="text-center mb-4">Login</h1>

              <form class="needs-validation" novalidate>
                <div class="mb-3 position-relative ">
                  <input type="text" class="form-control " placeholder="Username" required>
                  <i class="bi bi-person position-absolute top-50 end-0 translate-middle-y me-3"></i>
                </div>

                <div class="mb-3 position-relative">
                  <input type="password" class="form-control glass-input" placeholder="Password" required>
                  <i class="bi bi-lock position-absolute top-50 end-0 translate-middle-y me-3"></i>
                </div>

                <div class="mb-4 d-flex justify-content-between align-items-center small">
                  <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="re">
                    <label class="form-check-label" for="re">Remember me</label>
                  </div>
                  <a href="#" class="text-white text-decoration-none">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-login w-100 py-2">Login</button>

                <div class="mt-3 text-center small">
                  <span>Don't have an account? </span>
                  <a href="#" class="text-white fw-bold text-decoration-none">Register</a>
                </div>
              </form>
            </div>

            <script src="assest/vendor/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
            <script>

              (() => {
                'use strict'
                const forms = document.querySelectorAll('.needs-validation')
                Array.from(forms).forEach(form => {
                  form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                      event.preventDefault()
                      event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                  }, false)
                })
              })()  
            </script>
</body>

</html>
