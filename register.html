<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assest/css/lymeng.css">
    <link rel="stylesheet" href="assest/vendor/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Register </title>
</head>
<body>
    <section class="section-login  auth">
        <div class="section-login-overlay py-5">
            <div class="container">
                <div class="row justify-content-center align-items-center">
                    <div class="col-12 col-lg-6 col-xl-4">
                        <div class="card shadow">
                            <div class="card-body p-5">
                                <h1 class="text-center">REGISTER</h1>
                                <p class="text-center small mb-4">Create a new account.</p>
                                <form action="">
                                   <div class="mb-4  ">
                                    <label for="name" class="form-label">Full name</label>
                                    <input type="text" class="form-control" name="name" id="name" placeholder="Full Name" required>
                                </div>
                                <div class="mb-4">
                                    <label for="email" class="form-label">Email : </label>
                                    <input type="email" class="form-control" name="email" id="email" placeholder="Email" required>
                                </div>
                                <div class="mb-4">
                                    <label for="pass" class="form-label">Password :  </label>
                                    <input type="password" class="form-control" name="pass" id="pass" placeholder="Password" required>
                                </div>
                                <div class="mb-4">
                                    <label for="c-pass" class="form-label"> Comfme-password  </label>
                                    <input type="password" class="form-control" name="c-pass" id="c-pass" placeholder="Com-Password" required>
                                </div>

                                    <button type="submit" class="btn btn-primary w-100">REGISTER</button>
                                    <div class="mt-2 text-center ">
                                        <span>Do you have an account?</span><a href="Login.html">Login</a>

                                    </div>
                                </form>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>



    <script src="assest/vendor/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
