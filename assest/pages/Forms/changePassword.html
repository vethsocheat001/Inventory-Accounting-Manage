<!DOCTYPE html>

<head>

<body>
    <section>
    <div class="container">
     <div class="card-box">
    <div class="auth-card row g-0">
    <div class="col-lg-6 form-side">
      <h1 class="text-center mb-5  h2 fw-bold">CHANGE PASSWORD</h1>
      <form class=" needs-validation" action="#" novalidate>
       <div class="mb-4">
          <input type="password" class="form-control" name="pass" id="pass" placeholder="Current Password" required>
            </div>
                <div class="mb-4">
                    <input type="password" class="form-control" name="pass" id="pass" placeholder="New Password" required>
                </div>
                <div class="mb-4">  
                 <input type="password" class="form-control" name="c-pass" id="c-pass" placeholder="Comfirm-Password" required>
                </div>
                <button  type="submit" class="btn btn-primary w-100" onclick="window.location.href='login.html'; return false;">Update Password</button>
                 </form>
    </div>

         <img src="https://img.magnific.com/free-vector/access-control-system-abstract-concept_335657-3180.jpg?semt=ais_hybrid&w=740&q=80" alt="">

        </div>     
          </div>
  </section>
    <script src="../../vendor/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script> 
    <script>
      // Example starter JavaScript for disabling form submissions if there are invalid fields
            (() => {
            'use strict'

            // Fetch all the forms we want to apply custom Bootstrap validation styles to
            const forms = document.querySelectorAll('.needs-validation')

            // Loop over them and prevent submission
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }

                form.classList.add('was-validated')
                }, false)
            })
            })()  
    </script>
</body>
</html>
