<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="../../../css/phearoun.css" rel="stylesheet">
</head>
<body class="body">
<video autoplay muted loop playsinline id="bg-video">
    <source src="../../../image/videoform.mp4" type="video/mp4">
    Your browser does not support HTML5 video.
</video>

<div class="page-wrapper">
  <div class="login-card">

    <div class="icon-circle">
      <i class="fa-solid fa-lock"></i>
    </div>

    <div class="form-title">Set New Password</div>

    <form action="login.html" onsubmit="return true;">
      <div class="mb-2 pass-wrapper">
        <input type="password" class="form-control" id="newPassword" placeholder="New Password" oninput="checkStrength()" required>
        <button type="button" class="toggle-pass" onclick="togglePassword('newPassword', this)">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>
      <div class="mb-4 pass-wrapper">
        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm New Password" required>
        <button type="button" class="toggle-pass" onclick="togglePassword('confirmPassword', this)">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>

      <button type="submit" class="btn btn-login w-100">Update Password</button>
    </form>

    <a href="login.html" class="back-link">
      <i class="fa-solid fa-arrow-left"></i>Back to Login
    </a>

  </div>
</div>

<script>
  function togglePassword(id, btn) {
    const input = document.getElementById(id);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.remove('fa-eye');
      icon.classList.add('fa-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.remove('fa-eye-slash');
      icon.classList.add('fa-eye');
    }
  }

  function checkStrength() {
    const val = document.getElementById('newPassword').value;
    const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')];
    const text = document.getElementById('strengthText');

    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const colors = ['#ff6b6b', '#ffb347', '#ffd93d', '#4dd68a'];
    const labels = ['Weak', 'Fair', 'Good', 'Strong'];

    bars.forEach((bar, i) => {
      bar.style.background = i < score ? colors[Math.max(score - 1, 0)] : 'rgba(255,255,255,0.25)';
    });

    text.textContent = val.length === 0
      ? 'Use 8+ characters with a mix of letters, numbers & symbols'
      : labels[Math.max(score - 1, 0)] + ' password';
  }
</script>

</body>
</html>
