<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTP Verification</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        min-height: 100vh;
        background: #f0f4ff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", sans-serif;
      }
      .card {
        border: none;
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(41, 121, 255, 0.1);
        padding: 2.5rem 2rem;
        max-width: 420px;
        width: 100%;
      }
      .icon-circle {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: #e8f0fe;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        color: #2979ff;
        margin: 0 auto 1.25rem;
      }
      .otp-input {
        width: 48px;
        height: 56px;
        font-size: 22px;
        font-weight: 600;
        text-align: center;
        border: 1.5px solid #dee2e6;
        border-radius: 10px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        color: #212529;
      }

      .otp-input:focus {
        border-color: #2979ff;
        box-shadow: 0 0 0 3px rgba(41, 121, 255, 0.15);
      }

      .otp-input.is-invalid {
        border-color: #dc3545;
        box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.12);
      }

      .btn-verify {
        background: #2979ff;
        border: none;
        border-radius: 10px;
        padding: 12px;
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 0.3px;
        transition:
          background 0.2s,
          transform 0.1s;
      }
      .btn-verify:hover {
        background: #1a65e8;
      }
      .btn-verify:active {
        transform: scale(0.98);
      }
      .btn-verify:disabled {
        background: #a0b8f8;
      }
      .resend-link {
        color: #2979ff;
        cursor: pointer;
        text-decoration: none;
        font-weight: 500;
      }
      .resend-link:hover {
        text-decoration: underline;
      }
      .success-circle {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: #e8f5e9;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        color: #2e7d32;
        margin: 0 auto 1.25rem;
      }
    </style>
  </head>
  <body>
    <div class="card" id="otp-card" data-aos="zoom-in">
      <!-- Step: OTP Entry -->
      <div id="step-otp">
        <div class="icon-circle">
          <i class="bi bi-envelope-at"></i>
        </div>

        <h4 class="text-center fw-semibold mb-1">OTP code</h4>
        <div
          class="d-flex justify-content-center gap-2 mb-2"
          id="otp-boxes"
        ></div>

        <div
          id="error-msg"
          class="text-danger text-center small mb-2"
          style="display: none; min-height: 18px"
        ></div>

        <button
          class="btn btn-verify btn-primary w-100 text-white mt-2"
          id="verify-btn"
          onclick="verifyOtp()"
        >
          Verify
        </button>

        <p class="text-center text-muted small mt-3 mb-0">
          <span id="timer-text"
            >Resend code in <strong id="countdown">30s</strong></span
          >
          <a
            class="resend-link"
            id="resend-link"
            style="display: none"
            onclick="resend()"
            >Resend code</a
          >
        </p>
      </div>

      <!-- Step: Success -->
      <div id="step-success" style="display: none; text-align: center">
        <div class="success-circle">
          <i class="bi bi-check-lg"></i>
        </div>
        <h4 class="fw-semibold mb-1">Verified!</h4>
        <p class="text-muted small mb-4">
          Your identity has been confirmed.<br />You can now reset your
          password.
        </p>
        <button
          class="btn btn-verify btn-primary w-100 text-white"
          onclick="window.location.href='change_pass.html'"
        >
          Continue
        </button>
      </div>
    </div>

     <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      let timerInterval;

      function buildBoxes() {
        const container = document.getElementById("otp-boxes");
        container.innerHTML = "";
        for (let i = 0; i < 6; i++) {
          const inp = document.createElement("input");
          inp.type = "text";
          inp.maxLength = 1;
          inp.inputMode = "numeric";
          inp.className = "otp-input form-control";
          inp.addEventListener("input", (e) => {
            inp.value = inp.value.replace(/\D/g, "");
            clearError();
            if (inp.value && inp.nextSibling) inp.nextSibling.focus();
          });
          inp.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !inp.value && inp.previousSibling)
              inp.previousSibling.focus();
          });
          inp.addEventListener("paste", (e) => {
            e.preventDefault();
            const paste = (e.clipboardData || window.clipboardData)
              .getData("text")
              .replace(/\D/g, "")
              .slice(0, 6);
            const boxes = document.querySelectorAll("#otp-boxes input");
            paste.split("").forEach((ch, idx) => {
              if (boxes[idx]) boxes[idx].value = ch;
            });
            const next = boxes[Math.min(paste.length, 5)];
            if (next) next.focus();
          });
          container.appendChild(inp);
        }
        container.firstChild.focus();
      }

      function getCode() {
        return [...document.querySelectorAll("#otp-boxes input")]
          .map((b) => b.value)
          .join("");
      }

      function showError(msg) {
        const el = document.getElementById("error-msg");
        el.textContent = msg;
        el.style.display = "block";
        document
          .querySelectorAll("#otp-boxes input")
          .forEach((b) => b.classList.add("is-invalid"));
      }

      function clearError() {
        document.getElementById("error-msg").style.display = "none";
        document
          .querySelectorAll("#otp-boxes input")
          .forEach((b) => b.classList.remove("is-invalid"));
      }

      function verifyOtp() {
        const code = getCode();
        if (code.length < 6) {
          showError("Please enter all 6 digits.");
          return;
        }

        const btn = document.getElementById("verify-btn");
        btn.innerHTML =
          '<span class="spinner-border spinner-border-sm me-2"></span>Verifying…';
        btn.disabled = true;

        setTimeout(() => {
          btn.innerHTML = "Verify";
          btn.disabled = false;

          if (code === "123456") {
            document.getElementById("step-otp").style.display = "none";
            document.getElementById("step-success").style.display = "block";
            clearInterval(timerInterval);
          } else {
            showError("Incorrect code. Please try again.");
            document
              .querySelectorAll("#otp-boxes input")
              .forEach((b) => (b.value = ""));
            document.querySelector("#otp-boxes input").focus();
          }
        }, 1000);
      }

      function startTimer() {
        clearInterval(timerInterval);
        let secs = 30;
        document.getElementById("timer-text").style.display = "inline";
        document.getElementById("resend-link").style.display = "none";
        document.getElementById("countdown").textContent = secs + "s";

        timerInterval = setInterval(() => {
          secs--;
          if (secs <= 0) {
            clearInterval(timerInterval);
            document.getElementById("timer-text").style.display = "none";
            document.getElementById("resend-link").style.display = "inline";
          } else {
            document.getElementById("countdown").textContent = secs + "s";
          }
        }, 1000);
      }

      function resend() {
        document
          .querySelectorAll("#otp-boxes input")
          .forEach((b) => (b.value = ""));
        document.querySelector("#otp-boxes input").focus();
        clearError();
        startTimer();
      }

      function resetDemo() {
        location.reload();
      }

      buildBoxes();
      startTimer();

       AOS.init();
    </script>
  </body>
</html>
