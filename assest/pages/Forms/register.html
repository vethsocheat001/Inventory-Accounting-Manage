<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register</title>
     <link rel="stylesheet" href="../../vendor/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../css/phearoun.css">
</head>
<body>
<section>
    <div class="container">
     <div class="card-box">
    <div class="auth-card row g-0">
    <div class="col-lg-6 form-side">
      <h1 class="heading mb-4 text-center">REGISTER ACCOUNT</h1>
      <form>
         <div class="mb-2">
        <!-- <label for="name" class="field-label">Full name</label> -->
        <input type="text" class="form-control-custom mb-3" name="name" id="name" placeholder="Full Name" required>
        </div>
        <div class="mb-2">
        <!-- <label for="email" class="field-label">Email : </label> -->
        <input type="email" class="form-control-custom mb-3" name="email" id="email" placeholder="Email" required>
        </div>
        <div class="mb-2">
        <!-- <label for="pass" class="field-label">Password :  </label> -->
        <input type="password" class="form-control-custom mb-3" name="pass" id="pass" placeholder="Password" required>
        </div>
        <div class="mb-2">
       
        <input type="password" class="form-control-custom mb-3" name="c-pass" id="c-pass" placeholder="Com-Password" required>
        </div>

        <button type="submit" class="btn-submit">SING UP</button>
        <div class="divider">or continue with</div>
      </form>
      <div class="bottom-links">
        <span>Already have an account? </span>
        <a href="login.html">Login</a>
      </div>
    </div>
    <div class="col-6">
         <img src="https://img.magnific.com/free-vector/access-control-system-abstract-concept_335657-3180.jpg?semt=ais_hybrid&w=740&q=80" alt="">
        </div>     
          </div>
  </section>
   
    <script src="../../vendor/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Example starter JavaScript for disabling form submissions if there are invalid fields
            (() => {
            'use strict'

            // Fetch all the forms we want to apply custom Bootstrap validation styles to
            const forms = document.querySelectorAll('.needs-validation')

            // Loop over them and prevent submission
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }

                form.classList.add('was-validated')
                }, false)
            })
            })()  
    </script>
</body>
</html>
