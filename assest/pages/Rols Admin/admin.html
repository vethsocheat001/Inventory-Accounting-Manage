<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar {
            background-color: #1e1e2d !important;
            color: #fff !important;
            min-height: 100vh;
        }

        @media (min-width: 768px) {
            .offcanvas-md {
                position: static;
                transform: none !important;
                visibility: visible !important;
                width: 250px;
                flex: 0 0 250px;
            }
        }

        .nav-link {
            color: #adb5bd !important;
            cursor: pointer;
            border-radius: 5px;
        }

        .nav-link:hover {
            background-color: #2b2b40;
            color: #fff !important;
        }

        .nav-link.active {
            background-color: #4f46e5 !important;
            color: #fff !important;
        }

        .main-content {
            background-color: #f8f9fa;
            flex-grow: 1;
            min-height: 100vh;
        }

        .page-section {
            display: none;
        }

        .page-section.active {
            display: block;
        }

        /* កែសម្រួលរូបភាពឱ្យងាយស្រួលមើល */
        .logodb {
            width: 40px;
            height: 40px;
            object-fit: cover;
            margin-right: 10px;
        }
    </style>
</head>

<body>

    <div class="d-flex">
        <div class="offcanvas-md offcanvas-start sidebar p-3" tabindex="-1" id="sidebarMenu">
            <div class="offcanvas-header d-md-none">
                <div class="d-flex align-items-center">
                    <img class="logodb" src="assets/image/logos.png" alt="Logo" onerror="this.style.display='none'">
                    <h5 class="offcanvas-title">Admin Panel</h5>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                    data-bs-target="#sidebarMenu"></button>
            </div>
            <div class="offcanvas-body flex-column">
                <div class="d-none d-md-flex align-items-center mb-4 justify-content-center">
                    <img class="logodb" src="/assest/image/logos.png" alt="Logo">
                    <h4>Admin Panel</h4>
                </div>
                <ul class="nav nav-pills flex-column">
                    <li class="nav-item"><a class="nav-link active" onclick="showPage('dashboard', this)">Dashboard</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" onclick="showPage('settings', this)">Settings</a></li>
                    <li class="nav-item"><a class="nav-link" onclick="showPage('settings', this)">Settings</a></li>
                    <li class="nav-item"><a class="nav-link" onclick="showPage('settings', this)">Settings</a></li>
                    <li class="nav-item"><a class="nav-link" onclick="showPage('settings', this)">Settings</a></li>
                    <li class="nav-item"><a class="nav-link" onclick="showPage('settings', this)">Settings</a></li>
                    <li class="nav-item"><a class="nav-link" onclick="showPage('settings', this)">Settings</a></li>
                    <li class="nav-item"><a class="nav-link" onclick="showPage('settings', this)">Settings</a></li>
                </ul>
                <div class="mt-auto p-3 rounded-3 km small text-secondary" style="background:rgba(255,255,255,.05);">
                    <b class="text-white">គន្លឹះ៖</b> ចុចលើម៉ឺនុយខាងលើ ដើម្បីមើលព័ត៌មានលម្អិតបន្ថែម។
                </div>
            </div>
        </div>

        <div class="main-content">
            <nav class="navbar navbar-light bg-white border-bottom p-3">
                <div class="container-fluid">
                    <button class="navbar-toggler d-md-none" type="button" data-bs-toggle="offcanvas"
                        data-bs-target="#sidebarMenu">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <span class="navbar-text ms-auto">John, Store Manager</span>
                </div>
            </nav>

            <div class="container-fluid p-4">
                <div id="dashboard" class="page-section active">
                    <h2>Dashboard</h2>
                    <div class="row g-3">
                        <div class="col-md-3">
                            <div class="card p-3 border-0 shadow rounded-4">
                                <h6>Total SKU</h6>
                                <h4>1204</h4>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card p-3 border-0 shadow rounded-4">
                                <h6>Stock</h6>
                                <h4>6</h4>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="settings" class="page-section">
                    <h2>Account Settings</h2>
                    <div class="card p-4">
                        <form>
                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" placeholder="John Manager">
                            </div>
                            <button class="btn btn-primary">Update Profile</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        function showPage(pageId, element) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');

            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            element.classList.add('active');

            const sidebar = document.getElementById('sidebarMenu');
            const bsOffcanvas = bootstrap.Offcanvas.getInstance(sidebar);
            if (bsOffcanvas && window.innerWidth < 768) {
                bsOffcanvas.hide();
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
