<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="assest/vendor/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Login </title>
</head>
<body>
    <section class="section-login  auth ">
        <div class="section-login-overlay py-5">
            <div class="container">
                <div class="row justify-content-center align-items-center">
                    <div class="col-12 col-lg-6 col-xl-4">
                        <div class="card shadow">
                            <div class="card-body ">
                                <form action="" class=" needs-validation" action="#" novalidate>
                                <h1 class="text-center">ChangePassword</h1>
                                <p class="text-center small mb-4">Lorem consectetur adipisicing.</p>
                                   <div class="mb-4">
                                    <label for="pass" class="form-label">New Password :  </label>
                                    <input type="password" class="form-control" name="pass" id="pass" placeholder="New Password" required>
                                </div>
                                <div class="mb-4">
                                    <label for="c-pass" class="form-label"> Comfirm-password  </label>
                                    <input type="password" class="form-control" name="c-pass" id="c-pass" placeholder="Comfirm-Password" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100"><a href="Login.html" class=" text-light text-decoration-none">send </a></button>
                                
                            </form>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <Script src="asset/vender/bootstrap-5.3.8-dist/js/bootstrap.bundle.js"></Script>
<script>
      // Example starter JavaScript for disabling form submissions if there are invalid fields
            (() => {
            'use strict'

            // Fetch all the forms we want to apply custom Bootstrap validation styles to
            const forms = document.querySelectorAll('.needs-validation')

            // Loop over them and prevent submission
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }

                form.classList.add('was-validated')
                }, false)
            })
            })()  
    </script>

</body>
</html>
    <script src="assest/vendor/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
